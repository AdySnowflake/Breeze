name: Build iOS

on:
  push:
    branches: main
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up FVM and Flutter
        run: |
          brew tap leoafarias/fvm
          brew install fvm
          fvm install
          fvm use --force
          
      - name: Create iOS platform if not exists
        run: |
          if [ ! -d "ios" ]; then
            fvm flutter create --platforms=ios .
          fi

      - name: Set iOS deployment target to 16.0
        run: |
          # 修改 Podfile
          sed -i '' "s/platform :ios, '[0-9.]*'/platform :ios, '16.0'/" ios/Podfile
          # 修改 project.pbxproj
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*;/IPHONEOS_DEPLOYMENT_TARGET = 16.0;/g' ios/Runner.xcodeproj/project.pbxproj
          
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: aarch64-apple-ios
      
      - name: Install CocoaPods
        run: sudo gem install cocoapods
      
      - name: Build iOS (no code sign)
        env:
          FLUTTER_XCODE_CODE_SIGN_STYLE: Manual
          FLUTTER_XCODE_CODE_SIGN_IDENTITY: ""
          FLUTTER_XCODE_DEVELOPMENT_TEAM: ""
        run: |
          export CODE_SIGN_IDENTITY=""
          export CODE_SIGNING_REQUIRED=NO
          export CODE_SIGN_ENTITLEMENTS=""
          export CODE_SIGNING_ALLOWED=NO
          fvm flutter build ios --release --no-codesign
      
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: build/ios/iphoneos/*.app
